<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /*General Body Styling*/
        body {
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        /*Text Sizing and Shadows*/
        h1 {
            font-size: 2.5rem; /*Large text size*/
            color: #333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /*Subtle text shadow*/
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        /*Box Model and Spacing for Navigation*/
        nav {
            background: white;
            padding: 15px; /*Internal spacing*/
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /*Box shadow*/
            display: inline-block; /*wraps box to content size*/
        }
        /*Spacing for Links*/
        nav a {
            text-decoration: none;
            color: #007BFF;
            margin-right: 15px; /* Spacing between links */
            font-weight: bold;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Jacqueline's Homepage</h1>
    <p>This is my portfolio</p>

        <a href="music-games.html">Music-Games</a>
        <a href="contact.html">Contact</a>

    </nav>
</body>
</html>
